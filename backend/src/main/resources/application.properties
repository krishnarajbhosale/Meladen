spring.application.name=meladen-backend
server.port=8080

spring.config.import=optional:file:application-local.properties,optional:file:backend/application-local.properties

spring.datasource.url=jdbc:mysql://localhost:3306/meladen?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

meladen.jwt.secret=meladen-dev-secret-change-me-use-at-least-256-bits-in-production-please-rotate
meladen.jwt.expiration-ms=86400000

meladen.seed.admin.email=admin@meladen.com
meladen.seed.admin.password=admin123

# Customer OTP via Gmail SMTP. Set false in production (no dev code on screen).
meladen.auth.expose-dev-otp=${MELADEN_EXPOSE_DEV_OTP:false}
meladen.upload.returns-dir=uploads/returns

spring.servlet.multipart.max-file-size=52MB
spring.servlet.multipart.max-request-size=55MB

# Gmail SMTP — set MELADEN_MAIL_PASSWORD on the server (app password, no spaces)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MELADEN_MAIL_USERNAME:team.meladenperfumes@gmail.com}
spring.mail.password=${MELADEN_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
meladen.mail.from=${MELADEN_MAIL_FROM:team.meladenperfumes@gmail.com}

# Razorpay
meladen.razorpay.key-id=${RAZORPAY_KEY_ID:}
meladen.razorpay.key-secret=${RAZORPAY_KEY_SECRET:}

# Shiprocket (https://apidocs.shiprocket.in/)
meladen.shiprocket.email=${SHIPROCKET_EMAIL:}
meladen.shiprocket.password=${SHIPROCKET_PASSWORD:}
meladen.shiprocket.enabled=${SHIPROCKET_ENABLED:true}
meladen.shiprocket.pickup-location=${SHIPROCKET_PICKUP_LOCATION:Primary}
